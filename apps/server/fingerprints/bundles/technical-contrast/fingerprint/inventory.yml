building_blocks:
  tokens:
    - "--color-bg: white or pale technical canvas."
    - "--color-surface: primary card, form, and table surface."
    - "--color-surface-muted: hairline-light rail, table header fill, and subtle footer stencil."
    - "--color-surface-dark: midnight proof plane background."
    - "--color-surface-dark-soft: dark card or badge fill inside midnight planes."
    - "--color-border: light hairline dividers and card chrome."
    - "--color-border-strong: ink rule or active tab/selected edge."
    - "--color-text: black ink on light surfaces."
    - "--color-text-muted: body secondary text, captions, and table subcopy."
    - "--color-text-on-dark: white text on midnight surfaces."
    - "--color-accent: primary black CTA and selected state."
    - "--color-signal-a, --color-signal-b, --color-signal-c: optional warm-to-cool signal artwork stops, not a general UI palette."
    - "--color-tint-mint and --color-tint-periwinkle: pastel proof/stat tile fills."
    - "--space-3 through --space-8: compact control rhythm to generous plane rhythm."
    - "--radius-sm: tighter control radius."
    - "--radius-md: canonical 4px card/button radius."
    - "--radius-lg: slightly larger tab rail or grouped-control radius."
    - "--radius-pill: isolated circular or pill icon controls only."
    - "--font-sans: geometric narrative face."
    - "--font-mono: uppercase technical label face."
    - "--text-display through --text-xs: tight display hierarchy and compact labels."
    - "--tracking-label: positive mono label tracking."
    - "--tracking-display: slight negative tracking for display sans."
    - "--shadow-* are intentionally quiet; card depth is border-led."
  components:
    - "technical-plane-landing"
    - "pale-technical-canvas"
    - "midnight-proof-plane"
    - "white-data-sheet"
    - "left-sidebar-category-rail"
    - "mobile-category-accordion"
    - "muted-proof-rail"
    - "muted-recognition-rail"
    - "optional-signal-artwork"
    - "mobile-cropped-signal-artwork"
    - "mono-eyebrow"
    - "mono-button"
    - "black-primary-button"
    - "mint-secondary-button"
    - "white-secondary-button"
    - "dark-soft-button"
    - "small-radius-card"
    - "dark-proof-card"
    - "tinted-stat-tile"
    - "technical-update-card"
    - "product-ui-proof-mockup"
    - "technical-table"
    - "table-header-mono"
    - "table-row-hairline"
    - "segmented-tab-rail"
    - "technical-form-sheet"
    - "code-editor-breakout"
    - "low-contrast-terminal-signoff"
    - "copy atom: Claim, Capability, Throughput, Latency, Cost, Limit, Region, Model, Capacity, Research, Proof, Contact, Start, Compare, Recommendation, Benchmark, Security, Compliance, Routing."
    - "state variant: featured tier, active tab, selected row, unavailable capacity, recommended path, empty data, loading table, validation error, mobile category collapsed, mobile category expanded, table row overflow."
    - "micro-pattern: proof tile with large number, mono label, one-sentence implication."
    - "micro-pattern: data row with model/capability name, compact secondary description, and aligned numeric cells."
    - "micro-pattern: dark card with mono tag, display title, and short body proof."
    - "micro-pattern: benchmark card with category badge, technical headline, and implication sentence."
    - "micro-pattern: mobile cropped signal artwork below stacked hero CTAs."
  libraries: []
  assets:
    - "examples/core/technical-plane-landing.png"
    - "examples/core/white-technical-pricing-sheet.png"
    - "examples/core/midnight-research-proof-plane.png"
    - "examples/core/technical-config-workflow.png"
    - "examples/core/code-breakout-capability-panel.png"
    - "examples/core/mobile-technical-landing-stack.png"
    - "examples/core/technical-benchmark-update-card.png"
  files:
    - "fingerprint/sources/curation/source-study-2026-06-22.md"
    - "fingerprint/sources/curation/together-ai-online-research-2026-06-22.md"
    - "fingerprint/sources/curation/dogfood-review-rubric-2026-06-22.md"
    - "fingerprint/memory/intent.md"
    - "examples/core/README.md"
    - "examples/dogfood/prompts.md"
  notes:
    - "The catalog entry is agnostic: no source domains, product names, logos, literal wordmark text, customer logos, exact pricing values, source screenshots, or proprietary artwork should appear in generated surfaces unless the user's prompt supplies them."
    - "The researched public technical-platform pages are composition evidence only; source marks, copy, screenshots, model names, customer names, conference logos, and pricing data are excluded from portable generation guidance."
    - "Signal artwork is optional at large scale only; data and controls remain flat and readable."
    - "The language is technical and compact, but not command-line brutalism."
    - "White data sheets, hairline tables, and uppercase mono labels are as important as midnight proof planes."
    - "Exemplars are derived neutral artifacts, not source screenshots. Current exemplar weights are curator recommendations pending dogfood scoring."

