summary:
  product: "Technical Contrast"
  audience:
    - "technical evaluators comparing infrastructure, models, capacity, or platform capabilities"
    - "teams deciding between tiers, workflows, experiments, rollout paths, or implementation options"
    - "agents composing polished generated surfaces from structured technical detail"
  goals:
    - "Make complex technical options feel clear, modern, and production-ready."
    - "Use contrast planes, tight type, mono labels, hairline structure, and white data sheets as the primary surface language."
    - "Keep signal artwork optional and subordinate to the claim, proof, and comparison structure."
    - "Keep pricing, model, capacity, and evidence information dense enough to compare without feeling like a dashboard dump."
    - "Translate public technical-platform research into source-agnostic generated surfaces without brand mimicry."
  anti_goals:
    - "Literal brand reuse: source names, domains, logos, slogans, wordmarks, customer logos, proprietary screenshots, proprietary copy, exact model/pricing values, or proprietary hero art."
    - "Generic SaaS card grids with soft shadows, full-pill CTAs, neon AI glow, bubbly effects, or icon-heavy decoration."
    - "Making the optional signal artwork the identity of every surface."
    - "Rainbow accent systems, many category colors, or repeated decorative signal marks."
    - "Marketing flourish that hides technical comparison, cost, capability, proof, or next action."
    - "Console-like mono paragraphs; monospace is a label system, not the narrative voice."
  tradeoffs:
    - "Prefer structured comparison over decorative variety when technical options differ by capability, cost, latency, or scale."
    - "Prefer contrast planes and hairlines over shadows for hierarchy."
    - "Prefer no artwork over small repeated artwork when a surface is data-heavy or workflow-heavy."
    - "Use compact spacing in tables and controls, while preserving generous plane-level breathing room."
    - "Allow pale landing planes as readily as midnight landing planes when the task needs approachability before proof."
  tone:
    - "technical"
    - "precise"
    - "confident"
    - "modern"
    - "restrained"
    - "infrastructure-aware"

situations:
  - id: platform-landing
    title: "Platform landing"
    user_intent: "Introduce a technical product, system, or capability set with a confident narrative and visible proof."
    product_obligation: "Open with a high-contrast technical plane and a strong sentence-case claim; support it with compact proof, CTAs, and optional large signal artwork."
    surface_type: "landing"
    principles:
      - prose.principle:contrast-planes-carry-drama
      - prose.principle:signal-artwork-is-optional
      - prose.principle:type-contrast-is-technical-voice
    experience_contracts:
      - prose.experience_contract:source-agnostic-output
      - prose.experience_contract:primary-claim-before-detail
    patterns:
      - composition.pattern:technical-plane-landing
      - composition.pattern:banded-technical-narrative
      - composition.pattern:mono-eyebrow-system
    refuses:
      - "Logo- or source-name-led mimicry."
      - "Decorative hero artwork that competes with technical proof."
      - "Dark-only landing rules that ignore when a pale technical canvas is the better opening plane."
      - "Mobile collapse that shrinks signal artwork into repeated icons or hides the primary action."

  - id: pricing-or-capacity-comparison
    title: "Pricing or capacity comparison"
    user_intent: "Compare tiers, costs, models, capacity, or deployment choices."
    product_obligation: "Keep comparison fields aligned and readable, with mono headers, dense but humane rows, and a visible comparison frame."
    surface_type: "comparison"
    principles:
      - prose.principle:technical-data-stays-structured
      - prose.principle:hairlines-not-shadows
    experience_contracts:
      - prose.experience_contract:comparison-criteria-stay-visible
      - prose.experience_contract:primary-claim-before-detail
    patterns:
      - composition.pattern:left-sidebar-pricing-navigation
      - composition.pattern:pricing-table-sheet
      - composition.pattern:segmented-technical-tabs
      - composition.pattern:small-radius-rectangles
    refuses:
      - "Unaligned pricing cards that hide shared criteria."
      - "Color-coded winners when a black fill, position, or mono label can carry emphasis."
      - "Decorative artwork inside the primary data sheet."
      - "Mobile stacks that remove row labels or make comparison criteria implicit."

  - id: research-or-proof-plane
    title: "Research or proof plane"
    user_intent: "Show why a technical capability is credible."
    product_obligation: "Use a midnight proof plane or crisp proof grid to connect research, metrics, and operational claims."
    surface_type: "proof"
    principles:
      - prose.principle:contrast-planes-carry-drama
      - prose.principle:technical-data-stays-structured
    experience_contracts:
      - prose.experience_contract:proof-supports-claim
    patterns:
      - composition.pattern:midnight-proof-plane
      - composition.pattern:dark-proof-card-grid
      - composition.pattern:tinted-stat-tiles
      - composition.pattern:code-editor-breakout
    refuses:
      - "Loose testimonial or metric cards without a clear technical implication."
      - "Overdecorated research cards with glows, illustrations, or rainbow states."
      - "Recognition logos or awards used as the main hierarchy instead of supporting a claim."

  - id: technical-form-or-workflow
    title: "Technical form or workflow"
    user_intent: "Configure, filter, request, or launch a technical action."
    product_obligation: "Use simple white controls, black primary actions, tight labels, and clear state without changing the visual language."
    surface_type: "workflow"
    principles:
      - prose.principle:type-contrast-is-technical-voice
      - prose.principle:hairlines-not-shadows
    experience_contracts:
      - prose.experience_contract:actions-remain-rectangular-and-clear
      - prose.experience_contract:source-agnostic-output
    patterns:
      - composition.pattern:technical-form-sheet
      - composition.pattern:rectangular-cta-system
      - composition.pattern:segmented-technical-tabs
      - composition.pattern:small-radius-rectangles
    refuses:
      - "Soft neumorphic inputs, heavy shadows, or playful rounded controls."
      - "Primary buttons that become full pills or decorative color treatments."
      - "Product UI mockups that show source screenshots instead of neutral configuration state."

  - id: technical-update-or-benchmark-card
    title: "Technical update or benchmark card"
    user_intent: "Present a benchmark, certification, model-serving update, or research announcement as proof inside a larger technical surface."
    product_obligation: "Use a compact proof card with a mono category badge, bold technical headline, short implication, and optional neutral graphic plane; connect the update to a capability, risk, cost, or decision."
    surface_type: "proof-card"
    principles:
      - prose.principle:technical-data-stays-structured
      - prose.principle:signal-artwork-is-optional
      - prose.principle:type-contrast-is-technical-voice
    experience_contracts:
      - prose.experience_contract:proof-supports-claim
      - prose.experience_contract:source-agnostic-output
    patterns:
      - composition.pattern:technical-update-card
      - composition.pattern:tinted-stat-tiles
      - composition.pattern:mono-eyebrow-system
    refuses:
      - "Logo-in-card mimicry or source blog title reuse."
      - "Decorative update cards that do not explain why the update matters."
      - "Soft blog-card carousels with no technical implication or next action."

principles:
  - id: contrast-planes-carry-drama
    principle: "Technical Contrast uses distinct planes: pale technical landings, white data sheets, and midnight proof planes; contrast, not decoration, creates rhythm."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "proof", "workflow", "proof-card"]
    guidance:
      - "Use pale or white technical canvases for approachability, product detail, pricing, forms, testimonials, and tables."
      - "Use near-black midnight for proof, research, or high-gravity technical claims."
      - "Avoid broad middle-grey backgrounds; if a softer rail is needed, keep it hairline-light and functional."
      - "Let plane changes separate major ideas before adding borders or shadows."
    counterexamples:
      - "A page made entirely of pale grey cards."
      - "Many softly tinted sections with no clear contrast rhythm."
      - "Dark hero treatment used automatically even when the surface needs a white technical sheet."
    evidence:
      - path: examples/core/technical-plane-landing.png
      - path: examples/core/midnight-research-proof-plane.png
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Promoted durable signals"
      - path: fingerprint/sources/curation/together-ai-online-research-2026-06-22.md
        locator: "Promoted durable signals"
      - path: fingerprint/sources/curation/together-ai-online-research-2026-06-22.md
        locator: "Promoted durable signals"

  - id: signal-artwork-is-optional
    principle: "Signal artwork is optional and large-scale; contrast, table structure, and type carry the language when decoration is unnecessary."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "proof", "proof-card"]
    guidance:
      - "Use one large abstract signal object only when it clarifies energy, capability, or proof."
      - "On mobile, crop a large signal object or omit it rather than turning it into repeated icons."
      - "Keep signal colors warm-to-cool and contained in the artwork rather than spreading them across controls."
      - "Do not reduce signal artwork to small icons, badges, underlines, category swatches, or CTA fills."
      - "Omit signal artwork on pricing, model, form, or workflow surfaces when the data should carry the page."
    counterexamples:
      - "Multiple unrelated decorative effects competing across cards."
      - "A fourth accent color added to make the surface feel more lively."
      - "Every surface forced to include a decorative object."
    evidence:
      - path: examples/core/technical-plane-landing.png
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Curation cautions"
      - path: fingerprint/sources/curation/together-ai-online-research-2026-06-22.md
        locator: "Home page"

  - id: type-contrast-is-technical-voice
    principle: "Sentence-case geometric sans copy and uppercase mono labels create the technical voice."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "proof", "workflow", "proof-card"]
    guidance:
      - "Use tight geometric sans for headlines, body copy, and narrative explanation."
      - "Use uppercase mono for eyebrows, buttons, tabs, table headers, compact metrics, and technical labels."
      - "Keep display headlines sentence-case and slightly tight; reserve all-caps for the mono system."
      - "Do not set paragraphs in mono or buttons in casual body text."
    counterexamples:
      - "All-caps display headlines."
      - "Long console-like mono descriptions."
    evidence:
      - path: examples/core/white-technical-pricing-sheet.png
      - path: examples/core/midnight-research-proof-plane.png
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Promoted durable signals"

  - id: technical-data-stays-structured
    principle: "Technical data earns trust through aligned rows, tabs, headers, side navigation, and compact labels."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "proof", "workflow", "proof-card"]
    guidance:
      - "Use tabular or matrix structures for cost, model, capacity, latency, limits, and feature comparisons."
      - "Keep shared criteria visible rather than burying them inside separate cards."
      - "Use mono headers and short parallel row labels."
      - "Let dense tables scroll, stack with preserved row labels, or collapse into category accordions instead of replacing them with unrelated cards."
    counterexamples:
      - "Pricing tiers with different internal layouts."
      - "Metric tiles that do not connect to a claim or criterion."
      - "Workflow controls that hide their technical state behind friendly cards."
    evidence:
      - path: examples/core/white-technical-pricing-sheet.png
      - path: examples/core/technical-config-workflow.png
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Page observations"
      - path: fingerprint/sources/curation/together-ai-online-research-2026-06-22.md
        locator: "Pricing page"

  - id: hairlines-not-shadows
    principle: "Depth comes from hairline borders, dividers, surface contrast, and dark-on-dark panels rather than floating shadows."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "proof", "workflow", "proof-card"]
    guidance:
      - "Use 1px hairlines on white sheets and dark-soft borders on midnight sections."
      - "Keep card corners lightly rounded and flat."
      - "Reserve subtle shadow only for truly floating host controls or transient overlays."
      - "Use border weight, fill polarity, or placement to emphasize the chosen option."
    counterexamples:
      - "Soft elevated SaaS cards with large shadows."
      - "Glassmorphism, glows, or blurred panels as the main depth language."
    evidence:
      - path: examples/core/white-technical-pricing-sheet.png
      - path: examples/core/code-breakout-capability-panel.png
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Promoted durable signals"

experience_contracts:
  - id: source-agnostic-output
    contract: "Generated surfaces preserve the composition language without reusing source names, domains, slogans, logos, literal wordmarks, proprietary copy, or proprietary artwork."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "proof", "workflow", "proof-card"]
    obligations:
      - "Name the generated product, topic, or task from the user's prompt, not from the source inspiration."
      - "Translate terminal-brand gestures into generic low-contrast sign-offs or omit them."
      - "Treat signal artwork as an abstract composition, not a copied asset."
      - "Use generic placeholders for customer logos, conference marks, model names, and pricing values unless the prompt supplies them."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
        locator: "Rejected source-specific material"
      - path: fingerprint/sources/curation/together-ai-online-research-2026-06-22.md
        locator: "Rejected source-specific material"

  - id: primary-claim-before-detail
    contract: "The first major region states the technical claim, comparison frame, or recommended action before details."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "proof", "proof-card"]
    obligations:
      - "Use a sentence-case headline and concise lead before grids or tables."
      - "Place CTAs or next actions near the claim when action is expected."
      - "Avoid neutral titles that merely restate the prompt."
    evidence:
      - path: examples/core/technical-plane-landing.png
      - path: examples/core/midnight-research-proof-plane.png

  - id: comparison-criteria-stay-visible
    contract: "Comparisons expose shared criteria in aligned rows, columns, table headers, or side-navigation categories."
    applies_to:
      paths: ["."]
      surface_types: ["comparison"]
    obligations:
      - "Use the same criteria names across options."
      - "Keep price, limit, capability, risk, and recommendation cells aligned."
      - "Do not make the user infer comparable facts from differently structured cards."
      - "On mobile, preserve criteria with row labels, sticky labels, horizontal scroll, or grouped accordions."
    evidence:
      - path: examples/core/white-technical-pricing-sheet.png

  - id: proof-supports-claim
    contract: "Metrics, proof cards, research snippets, and code/configuration panels must explain why the primary claim is credible."
    applies_to:
      paths: ["."]
      surface_types: ["proof", "landing", "proof-card"]
    obligations:
      - "Pair large numbers with labels and implications."
      - "Use proof cards to connect capability, outcome, and operational meaning."
      - "Avoid orphaned stats or testimonial fragments."
      - "Technical update cards must include an implication, not just a headline and link."
    evidence:
      - path: examples/core/midnight-research-proof-plane.png
      - path: examples/core/code-breakout-capability-panel.png

  - id: actions-remain-rectangular-and-clear
    contract: "Primary actions use small-radius rectangular buttons with uppercase mono labels and clear contrast."
    applies_to:
      paths: ["."]
      surface_types: ["landing", "comparison", "workflow"]
    obligations:
      - "Use black primary buttons on light surfaces."
      - "Use white, mint, or dark-soft buttons only when the button lives on a midnight plane."
      - "Reserve full-circle geometry for isolated icon controls, not primary CTA shape."
      - "Keep compact rectangular CTAs visible when the landing surface collapses to mobile."
    evidence:
      - path: examples/core/technical-plane-landing.png
      - path: examples/core/technical-config-workflow.png
