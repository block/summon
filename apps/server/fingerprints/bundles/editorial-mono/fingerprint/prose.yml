summary:
  product: "Editorial Mono"
  audience:
    - "readers comparing options"
    - "decision-makers who need a recommendation"
    - "agents composing refined generated briefs"
  goals:
    - "Make the useful claim legible before supporting detail."
    - "Turn choices, evidence, and tradeoffs into an edited editorial surface."
    - "Use monochrome restraint, type, rules, and alignment as the primary visual language."
    - "Keep generated work decisive, precise, and scannable without becoming generic SaaS."
  anti_goals:
    - "Generic dashboard shells, marketing hero pages, or rounded card grids that merely organize content."
    - "Cozy planner styling, garden-note warmth, decorative badges, pastel panels, or soft lifestyle language."
    - "Using color as personality; emphasis should come from ink, inverse panels, rules, type, and spacing."
    - "Completeness that buries the verdict under equal-weight criteria, paragraphs, or widgets."
    - "Austere output that feels empty, ornamental, or art-directed without helping a decision."
  tradeoffs:
    - "Prefer verdict over exhaustive explanation when the user came to decide."
    - "Prefer aligned criteria over varied card composition when comparing options."
    - "Prefer evidence density over decorative whitespace, while preserving enough air to scan."
    - "Use severity carefully: the tone can be exact and austere without becoming hostile."
  tone:
    - "calm"
    - "exact"
    - "editorial"
    - "austere"
    - "decisive"
    - "measured"

situations:
  - id: recommendation-memo
    title: "Recommendation memo"
    user_intent: "Select or justify one path from several plausible options."
    product_obligation: "Lead with the recommendation, then show the evidence and risk that make the choice credible."
    surface_type: "review"
    principles:
      - prose.principle:editorial-hierarchy
      - prose.principle:verdict-earns-the-page
    experience_contracts:
      - prose.experience_contract:verdict-before-evidence
      - prose.experience_contract:conclusion-is-actionable
    patterns:
      - composition.pattern:masthead-deck-folio-shell
      - composition.pattern:ruled-evidence-bands
      - composition.pattern:editorial-close
    refuses:
      - "Balanced option cards where no recommendation is visually or verbally committed."
      - "Friendly assistant copy that delays the answer with setup."

  - id: comparison-scorecard
    title: "Comparison scorecard"
    user_intent: "Compare options across shared criteria."
    product_obligation: "Make the tradeoffs visible through aligned criteria, ruled structure, and a clear recommendation marker."
    surface_type: "comparison"
    principles:
      - prose.principle:editorial-hierarchy
      - prose.principle:criteria-create-trust
    experience_contracts:
      - prose.experience_contract:criteria-stay-aligned
      - prose.experience_contract:monochrome-is-material
    patterns:
      - composition.pattern:criteria-matrix-over-cards
      - composition.pattern:single-inverse-ink-panel
    refuses:
      - "Staggered cards that make options hard to compare."
      - "Color-coded winners, badges, or score bubbles when an ink label or border weight can carry the distinction."

  - id: editorial-review
    title: "Editorial review"
    user_intent: "Critique, evaluate, or summarize evidence with a point of view."
    product_obligation: "Make judgment visible without over-explaining; separate claim, evidence, and implication."
    surface_type: "review"
    principles:
      - prose.principle:editorial-hierarchy
      - prose.principle:monochrome-restraint-is-the-brand
    experience_contracts:
      - prose.experience_contract:scan-before-depth
      - prose.experience_contract:conclusion-is-actionable
    patterns:
      - composition.pattern:masthead-deck-folio-shell
      - composition.pattern:mono-metadata-system
      - composition.pattern:ruled-evidence-bands
    refuses:
      - "Decorative enthusiasm, star-rating gloss, or vague praise."
      - "Long paragraphs without visible editorial structure."

  - id: data-verdict
    title: "Data verdict"
    user_intent: "Turn metrics, rankings, or performance data into a clear claim."
    product_obligation: "Let the number or comparison carry the verdict, then explain what changed, why it matters, and what to do next."
    surface_type: "report"
    principles:
      - prose.principle:verdict-earns-the-page
      - prose.principle:criteria-create-trust
    experience_contracts:
      - prose.experience_contract:verdict-before-evidence
      - prose.experience_contract:monochrome-is-material
    patterns:
      - composition.pattern:data-verdict-report
      - composition.pattern:ruled-evidence-bands
      - composition.pattern:editorial-close
    refuses:
      - "Decorative charts, rainbow status palettes, or KPI cards with no editorial claim."

  - id: longform-brief
    title: "Longform brief"
    user_intent: "Read an article-like explanation with a structured conclusion."
    product_obligation: "Use a broadsheet shell, deck, metadata, sections, and pull facts so the piece scans before it reads."
    surface_type: "article"
    principles:
      - prose.principle:editorial-hierarchy
      - prose.principle:monochrome-restraint-is-the-brand
    experience_contracts:
      - prose.experience_contract:scan-before-depth
      - prose.experience_contract:display-type-must-fit
    patterns:
      - composition.pattern:masthead-deck-folio-shell
      - composition.pattern:mono-metadata-system
      - composition.pattern:editorial-close
    refuses:
      - "Blog template filler, marketing hero treatment, or unrelated illustration."

principles:
  - id: editorial-hierarchy
    principle: "Lead with a strong typographic claim, then support it with measured evidence, compact labels, and visible editorial rules."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "article", "review", "report"]
    guidance:
      - "Use direct, concrete copy that helps the reader decide or understand without a preamble."
      - "Let type scale, alignment, border weight, column structure, and whitespace create hierarchy before decoration."
      - "Prefer monochrome contrast, serif display type, mono metadata, square geometry, and ruled rows."
      - "Keep color nearly absent; when emphasis is needed use ink, border weight, or inverse black panels."
    counterexamples:
      - "Filler headings that restate the prompt."
      - "Decorative enthusiasm or vague labels."
      - "Rounded pastel cards, soft shadows, garden/lifestyle metaphors, or cozy productivity language."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: verdict-earns-the-page
    principle: "Editorial Mono feels strongest when the page is organized around a verdict, not around a neutral inventory of facts."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "review", "report"]
    guidance:
      - "State the recommendation, ranking, risk, or outcome before supporting detail."
      - "Use the largest type or one inverse ink panel for the verdict."
      - "Demote caveats into ruled evidence bands so they support the decision instead of competing with it."
    counterexamples:
      - "Equal-weight option cards with no decisive lead."
      - "A chart or table that reports data without a claim."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: criteria-create-trust
    principle: "Trust comes from shared criteria that line up visibly."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "review", "report"]
    guidance:
      - "Use repeated rows, columns, ranks, or labeled evidence bands when comparing."
      - "Keep criteria labels short and parallel."
      - "Mark the chosen option through position, border weight, or ink label rather than decorative color."
    counterexamples:
      - "Each option using a different internal layout."
      - "Criteria hidden inside prose paragraphs."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: monochrome-restraint-is-the-brand
    principle: "Monochrome restraint is the material system: ink, paper, rules, spacing, and type carry the personality."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "article", "review", "report"]
    guidance:
      - "Treat cream surfaces as editorial paper, not cozy beige warmth."
      - "Reserve semantic colors for true danger, success, info, or warning states."
      - "Use shadows sparingly or not at all; rely on borders and contrast."
      - "Use pill radius only for compact controls or labels, not broad panels."
    counterexamples:
      - "Accent colors used to create mood."
      - "Large rounded panels or soft shadows that soften the editorial posture."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

experience_contracts:
  - id: scan-before-depth
    contract: "A reader should understand the verdict, criteria, and next action before reading paragraph detail."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "review", "article", "report"]
    obligations:
      - "Show recommendation or primary claim early."
      - "Keep criteria labels aligned and short."
      - "Use an editorial shell: headline/deck, ruled evidence, compact metadata, and clear conclusion."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: verdict-before-evidence
    contract: "The headline, recommendation, or metric verdict appears before explanation."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "review", "report"]
    obligations:
      - "Put the verdict in the first major visual region."
      - "Use evidence to justify the claim, not to postpone it."
      - "Avoid neutral titles such as Overview, Summary, or Dashboard unless paired with a real claim."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: criteria-stay-aligned
    contract: "Comparisons must share visible criteria rows, columns, or bands."
    applies_to:
      paths: ["."]
      surface_types: ["comparison"]
    obligations:
      - "Use the same criteria names for every option."
      - "Keep labels short enough to scan as a system."
      - "Avoid staggered cards or unique per-option layouts that hide tradeoffs."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: monochrome-is-material
    contract: "Emphasis is made from ink, rules, inverse panels, type, spacing, and alignment before color."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "article", "review", "report"]
    obligations:
      - "Use black, cream, muted text, border weight, and inverse panels for hierarchy."
      - "Reserve semantic colors for actual state, not decoration."
      - "Avoid gradients, soft chromatic backgrounds, and mood badges."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: conclusion-is-actionable
    contract: "The surface closes with a decision, risk, next action, or editorial implication."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "review", "report", "article"]
    obligations:
      - "End with what to select, what changed, what to watch, or what to do next."
      - "Keep the close shorter and stronger than the evidence."
      - "Do not end on passive recap when the prompt asks for a recommendation."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: display-type-must-fit
    contract: "Large editorial type must wrap cleanly and never collide with host chrome."
    applies_to:
      paths: ["."]
      surface_types: ["article", "review", "comparison", "report"]
    obligations:
      - "Use safe top breathing room in hosted full-screen compositions."
      - "Keep display headlines within their shell with responsive line breaks."
      - "Reduce scale before allowing words to overlap, clip, or crowd the edges."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
