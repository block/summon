building_blocks:
  tokens:
    - "--color-bg: editorial paper background."
    - "--color-surface: clean paper surface for the primary shell."
    - "--color-surface-muted: muted paper for secondary bands."
    - "--color-border: hairline rule color."
    - "--color-border-strong: ink rule, recommendation marker, or strong divider."
    - "--color-text: ink."
    - "--color-text-muted: caption, deck, and supporting evidence text."
    - "--color-accent: ink accent, not a chromatic personality color."
    - "--color-danger, --color-success, --color-info, --color-warning: semantic states only."
    - "--space-5 through --space-10: editorial rhythm from tight evidence to large page breaks."
    - "--radius-sm through --radius-xl: squared editorial furniture; broad panels stay near-square."
    - "--radius-pill: compact labels and controls only, not card geometry."
    - "--font-serif: display and article voice."
    - "--font-mono: metadata, folios, labels, ranks, and criteria."
    - "--text-display, --text-2xl, --text-3xl: verdict and masthead scale; must fit the shell."
    - "--tracking-label: compact editorial labels; do not overuse in body copy."
    - "--leading-display and --leading-section: tight display rhythm for short headlines."
    - "--shadow-* are deliberately none; depth comes from rules, contrast, and paper tiers."
  components:
    - "editorial-shell"
    - "editorial-masthead"
    - "verdict-headline"
    - "deck"
    - "folio"
    - "comparison-row"
    - "criteria-matrix"
    - "ruled-evidence-band"
    - "compact-metadata"
    - "recommendation-label"
    - "inverse-ink-panel"
    - "metadata-rail"
    - "ruled-footer"
    - "editorial-close"
    - "data-verdict-number"
    - "risk-and-caveat-row"
    - "copy atom: Verdict, Evidence, Risk, Caveat, Recommendation, Accepted tradeoff, What changed, What to watch, Rank, Criteria."
    - "state variant: selected option, recommended path, waiting item, blocked risk, ready evidence, empty data, error state, incomplete comparison."
    - "micro-pattern: evidence band with label, fact, interpretation, and implication."
    - "micro-pattern: editorial close with recommendation, accepted tradeoff, or next action."
    - "micro-pattern: metadata rail with folio, timestamp, rank, and compact caption."
    - "micro-pattern: single inverse ink moment for the verdict or selected option."
  libraries: []
  files:
    - "fingerprint/sources/curation/source-study-2026-06-22.md"
  notes:
    - "Cream/paper neutrals are editorial material, not beige lifestyle warmth."
    - "Semantic colors exist for states but should not define the page personality."
    - "Serif fallback is intentional: generated UI should read editorial even when it uses generic element names."
    - "The strong contrast against Garden Notes is part of the catalog value; do not soften Editorial Mono into planning language."
    - "No canonical image exemplars are approved yet; add inventory.exemplars only from human-curated surfaces or accepted generation runs."

sources:
  - id: "source-study"
    kind: "file"
    ref: "sources/curation/source-study-2026-06-22.md"
    note: "Curation note for the upgraded Summon marketplace fingerprint."
