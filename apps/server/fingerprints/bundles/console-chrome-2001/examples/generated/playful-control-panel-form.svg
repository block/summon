<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="t d">
<title id="t">Playful control panel form</title><desc id="d">Original source-agnostic Console Chrome 2001 exemplar.</desc>
<defs>
  <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#3b4154" opacity=".55"/></pattern>
