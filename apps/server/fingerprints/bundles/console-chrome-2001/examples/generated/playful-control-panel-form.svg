  <filter id="hardShadow"><feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#21242e" flood-opacity=".85"/></filter>
</defs>
<rect width="100%" height="100%" fill="#d7d7d7"/>
<g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#21242e">

