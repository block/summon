<rect x="124" y="152" width="430" height="400" rx="8" fill="#dedede" stroke="#3d4f97" stroke-width="3"/><rect x="124" y="152" width="430" height="34" fill="#7a8aba"/><text x="142" y="174" font-weight="900">▤ REGISTER PLAYER</text><text x="150" y="220" font-weight="900">USERNAME</text><rect x="250" y="204" width="220" height="24" fill="#fff" stroke="#5a5f8c"/><text x="150" y="264" font-weight="900">FAVORITE GENRE</text><rect x="250" y="248" width="220" height="24" fill="#fff" stroke="#21242e"/><text x="260" y="265">Click to choose ▾</text><text x="150" y="308" font-weight="900">NOTIFY ME</text><circle cx="255" cy="304" r="7" fill="#fff" stroke="#5a5f8c"/><text x="270" y="308">Weekly beta drops</text><circle cx="255" cy="330" r="7" fill="#fff" stroke="#5a5f8c"/><text x="270" y="334">Tournament alerts</text><line x1="150" y1="366" x2="500" y2="366" stroke="#60619c" stroke-dasharray="2 4"/><text x="150" y="392" font-size="11">Note: Fictional access only. No source marks or assets.</text><rect x="150" y="430" width="110" height="28" fill="#ecab37" stroke="#3d4f97"/><text x="174" y="449" font-weight="900" font-size="10">SAVE DRAFT</text><rect x="372" y="430" width="104" height="28" fill="#f68d1f" stroke="#21242e"/><text x="396" y="449" fill="#fff" font-weight="900" font-size="10">SUBMIT</text>
