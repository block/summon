building_blocks:
  tokens:
    - "--color-bg: neutral desktop-era browser background outside the central chassis."
    - "--color-surface: white content cards, inputs, logo-like pills, and row highlights."
    - "--color-surface-muted: platinum inset rows, form panels, list bodies, and recessed fields."
    - "--color-surface-soft: pale-sky strip, secondary nav, and light inset modules."
    - "--color-canvas: primary periwinkle metallic chassis."
    - "--color-canvas-raised: raised chrome plates and poll/system tiles."
    - "--color-canvas-lavender and --color-canvas-ice: hero/promo tint fields."
    - "--color-command and --color-command-soft: carbon command slabs, top nav, rail buttons, and footer."
    - "--color-border: blended bevel divider and dotted rules."
    - "--color-border-strong: chrome-indigo shadow line and hard panel edge."
    - "--color-highlight: bright top/left bevel highlight."
    - "--color-text: carbon ink on light plates."
    - "--color-text-muted: chrome-indigo links, secondary labels, and row headlines."
    - "--color-text-alt: white text on carbon and orange slabs."
    - "--color-accent: signal orange for forward, submit, open, launch, continue, and arrow cues."
    - "--color-accent-utility: amber for tools, utility chips, badges, info tabs, and search Go buttons."
    - "--color-accent-nav: deeper nav gold for primary command words on carbon slabs."
    - "--color-brand-red: sparse identity or error mark, not a page fill."
    - "--color-systems-teal and --color-games-red: optional page-specific hero tints for circuitry, racing, status, or event themes."
    - "--space-1 through --space-5: compact control, row, seam, and panel padding rhythm."
    - "--space-6 through --space-8: hero, chassis, and major module spacing."
    - "--radius-none and --radius-xs: default hard/chamfered chrome and utility controls."
    - "--radius-sm through --radius-lg: small inset panels, list rows, bubbles, and promos; use sparingly."
    - "--radius-pill: logo-like pills, radio dots, arrow discs, and physical controls only."
    - "--font-sans: Arial/Helvetica web-safe interface voice."
    - "--font-display: heavy box-art display fallback for hero wordmarks."
    - "--font-mono: optional pixel micro-label fallback for captions and machine legends."
    - "--text-xs through --text-lg: period-compact body, label, nav, and tagline scale."
    - "--text-display and --text-3xl: outlined hero names and scoreboard claims."
    - "--tracking-label: silkscreen-like uppercase label tracking."
    - "--shadow-* use inset bevels and hard offsets; blurred elevation is not canonical."
  components:
    - "console-shell"
    - "chamfered-chassis"
    - "beveled-plate"
    - "inset-content-field"
    - "carbon-command-bar"
    - "halftone-command-slab"
    - "dual-nav-stack"
    - "pale-secondary-strip"
    - "brand-neutral-logo-pill"
    - "mascot-speech-bubble"
    - "search-cluster"
    - "amber-tool-chip"
    - "signal-orange-arrow-disc"
    - "signal-orange-chevron-chip"
    - "section-label-bar"
    - "official-news-row"
    - "thumbnail-feature-tile"
    - "poll-module"
    - "right-action-rail"
    - "info-box-with-amber-tab"
    - "promo-plate"
    - "system-or-hardware-tile"
    - "side-mounted-vertical-tab"
    - "dotted-divider"
    - "chrome-form-panel"
    - "compact-calendar"
    - "rating-stamp"
    - "carbon-footer-slab"
    - "stacked-mobile-command-header"
    - "copy atom: Search, Tips, Code, Finder, Go, Login, Subscribe, Newsletter, Help, Official, Featured, Poll, Submit, Explore, More, Launch, Open, Top, Rating, Archive."
    - "state variant: active command word, selected tool chip, pressed amber button, current row, advanced row, filled poll option, empty list, validation error, loading directory."
    - "micro-pattern: list row with small icon, bold blue headline, and trailing orange chevron chip."
    - "micro-pattern: hero plate with full-bleed textured field, outlined display wordmark, tagline, and orange arrow disc."
    - "micro-pattern: right rail stack with carbon command buttons above a white explainer box and promo plate."
    - "micro-pattern: search module with white input, select dropdown, amber Go chip, and compact tips link."
    - "micro-pattern: mobile stack with carbon command header, pale secondary row, hero plate, rows, form, and rail module below content."
  libraries: []
  files:
    - "fingerprint/sources/curation/source-study-2026-06-22.md"
    - "fingerprint/sources/curation/online-retro-console-research-2026-06-22.md"
    - "fingerprint/sources/curation/generated-exemplars-2026-06-22.md"
    - "fingerprint/sources/curation/dogfood-eval-prompts-2026-06-22.md"
    - "fingerprint/memory/intent.md"
  notes:
    - "This bundle is Nintendo-era-inspired but source-agnostic. It must not cause generated surfaces to reuse Nintendo-owned names, marks, characters, screenshots, console product imagery, or exact site copy."
    - "The attached design-analysis file supplied the primary token and composition inventory; portable evidence now flows through bundle-local curation notes and approved synthetic examples."
    - "Online research via Web Design Museum confirmed the fixed 830px-ish dense faceplate, mascot masthead, dual nav, hero, lists, poll, and rail module composition, but public screenshots remain historical evidence only."
    - "The useful portable language is Y2K console hardware: periwinkle molded plastic, hard bevels, carbon halftone command slabs, warm directional controls, tiny Arial labels, and box-art display treatment."

exemplars:
  - id: "console-homepage-faceplate"
    path: "examples/generated/console-homepage-faceplate.png"
    title: "Console homepage faceplate"
    surface_type: "landing"
    scope: "generated-exemplars"
    note: "Weighted canonical synthetic exemplar; original source-agnostic artifact approved as bundle evidence on 2026-06-22 pending human final review."
    why: "Shows the full shell: clipped periwinkle chassis, carbon command bar, pale secondary strip, hero plate, dense modules, right action rail, poll, thumbnail grid, and carbon footer."
    refs:
      - composition.pattern:fixed-console-shell
      - composition.pattern:dual-command-navigation
      - composition.pattern:box-art-hero-plate
      - composition.pattern:right-action-rail
      - prose.experience_contract:faceplate-before-content

  - id: "retro-catalog-directory"
    path: "examples/generated/retro-catalog-directory.png"
    title: "Retro cartridge catalog directory"
    surface_type: "directory"
    scope: "generated-exemplars"
    note: "Weighted canonical synthetic exemplar; original source-agnostic artifact approved as bundle evidence on 2026-06-22 pending human final review."
    why: "Shows search/finder utilities, framed thumbnail tiles, compact update rows, a selected detail panel, amber tools, and orange advance chips without source-owned game content."
    refs:
      - composition.pattern:tool-chip-search-cluster
      - composition.pattern:thumbnail-tile-grid
      - composition.pattern:stacked-news-or-list-rows
      - prose.experience_contract:scan-targets-stay-obvious

  - id: "playful-control-panel-form"
    path: "examples/generated/playful-control-panel-form.png"
    title: "Playful control panel form"
    surface_type: "workflow"
    scope: "generated-exemplars"
    note: "Weighted canonical synthetic exemplar; original source-agnostic artifact approved as bundle evidence on 2026-06-22 pending human final review."
    why: "Shows platinum form panels, section-label bars, compact inputs, dotted dividers, carbon support rail, amber utility action, orange submit, and practical status feedback."
    refs:
      - composition.pattern:chrome-form-panels
      - composition.pattern:dotted-technical-dividers
      - composition.pattern:amber-tool-and-submit-buttons
      - prose.experience_contract:forward-actions-are-orange
      - prose.experience_contract:controls-remain-compact-but-legible

  - id: "retro-scoreboard-brief"
    path: "examples/generated/retro-scoreboard-brief.png"
    title: "Retro scoreboard brief"
    surface_type: "brief"
    scope: "generated-exemplars"
    note: "Supporting synthetic exemplar; original source-agnostic artifact approved as bundle evidence on 2026-06-22 pending human final review."
    why: "Shows how the console chrome grammar adapts to a decision brief with ranked evidence rows, side tab, status stamps, one orange next action, and carbon footer."
    refs:
      - composition.pattern:side-mounted-vertical-tabs
      - composition.pattern:badge-and-rating-stamps
      - composition.pattern:chrome-footer-slab
      - prose.principle:density-is-control-panel-texture

  - id: "mobile-stacked-faceplate"
    path: "examples/generated/mobile-stacked-faceplate.png"
    title: "Mobile stacked console faceplate"
    surface_type: "mobile-adaptation"
    scope: "generated-exemplars"
    note: "Experimental synthetic exemplar; original source-agnostic artifact for modern narrow-screen adaptation pending human approval."
    why: "Shows how the command layer, hero, rows, form, and help rail can stack in a narrow shell while preserving the machine-frame metaphor and warm action semantics."
    refs:
      - composition.pattern:stacked-faceplate-adaptation
      - composition.pattern:fixed-console-shell
      - prose.experience_contract:controls-remain-compact-but-legible

