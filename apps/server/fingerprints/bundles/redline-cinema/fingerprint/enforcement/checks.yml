schema: ghost.checks/v1
id: redline-cinema-checks
checks:
  - id: no-local-absolute-paths
    title: "Portable fingerprint files must not reference curator-local paths"
    status: active
    severity: serious
    derivation:
      prose:
        - prose.experience_contract:source-agnostic-performance-language
      composition:
        - composition.pattern:derived-image-placeholder-discipline
    applies_to:
      scopes: [generated-surface]
      paths:
        - fingerprint/prose.yml
        - fingerprint/inventory.yml
        - fingerprint/composition.yml
        - fingerprint/memory/intent.md
      surface_types: [landing, editorial, specification, catalog, directory]
    detector:
      type: forbidden-regex
      pattern: '(/Users/|file://|/tmp/)'
    evidence:
      support: 1
      observed_count: 0
      examples:
        - fingerprint/prose.yml
        - fingerprint/inventory.yml
        - fingerprint/composition.yml
    repair: "Use package-relative refs under fingerprint/ or examples/, or summarize local research in source-study."

  - id: base-canvas-not-pure-black
    title: "Base canvas stays warm near-black"
    status: active
    severity: serious
    derivation:
      prose:
        - prose.principle:cinema-is-the-chrome
      inventory:
        - inventory.exemplar:cinematic-launch-hero
      composition:
        - composition.pattern:full-bleed-cinematic-hero
    applies_to:
      paths:
        - tokens.css
      surface_types: [landing, editorial, specification, catalog, directory]
    detector:
      type: forbidden-regex
      pattern: '--color-bg:\s*#000000\b'
    evidence:
      support: 0.95
      observed_count: 0
      examples:
        - tokens.css
    repair: "Use the Redline Cinema near-black canvas token rather than pure black."

  - id: default-radius-stays-square
    title: "Default furniture remains square"
    status: active
    severity: serious
    derivation:
      prose:
        - prose.principle:sharp-precision-signals-luxury
      inventory:
        - inventory.exemplar:white-preowned-catalog-sheet
      composition:
        - composition.pattern:scarce-red-cta-cluster
    applies_to:
      paths:
        - tokens.css
      surface_types: [landing, editorial, specification, catalog, directory]
    detector:
      type: required-regex
      pattern: '--radius-sm:\s*0px;[\s\S]*--radius-md:\s*0px;'
    evidence:
      support: 0.9
      observed_count: 1
      examples:
        - tokens.css
    repair: "Keep --radius-sm and --radius-md at 0px; reserve larger radii for utility inputs or badges only."
