patterns:
  - id: signal-rail-feed
    kind: "structure"
    pattern: "Ordered updates stack on a visible signal rail: timestamp or state on the rail, rounded tile body beside it, tight gaps between entries."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "brief"]
    guidance:
      - "Use a 1px vertical rail in violet, mint, white, or muted gray when sequence matters."
      - "Place mono uppercase timestamps, ranks, or state labels on or near the rail."
      - "Keep entries vertically close enough to read as one stream, typically with 12-16px gaps."
      - "Let an occasional saturated tile interrupt the rail rhythm for a lead item or urgent update."
    anti_patterns:
      - "Floating cards with no visible order."
      - "Decorative timeline dots without useful time, category, or state metadata."
      - "Large disconnected cards that make recent updates feel unrelated."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: pill-corner-stream-tile
    kind: "visual"
    pattern: "Stream entries use rounded pill-card geometry: dark or saturated rectangles with 20-24px corners and crisp hairline containment."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Use 20px radius for standard stream tiles and 24px radius for feature tiles."
      - "Give dark tiles a 1px white, gray, mint, or violet border."
      - "Use 24-32px interior padding for normal tiles, expanding to 40-48px for feature leads."
      - "Keep nested imagery clipped to the tile radius or a small 3-4px inner radius."
    anti_patterns:
      - "Square editorial cards."
      - "Soft note-card radii above 40px on large content panels."
      - "Deep nested card stacks inside a tile."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: saturated-hazard-tile
    kind: "visual"
    pattern: "High-priority stories or states become solid saturated blocks on the black canvas."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Use acid mint, electric violet, hot pink, warning orange, signal yellow, white, or electric blue as solid fills."
      - "Choose black text on mint, yellow, and white; choose white text on violet, blue, orange, and hot pink unless contrast demands otherwise."
      - "Do not fade, blur, or gradient the fill. The block should feel printed or pasted onto the dark field."
      - "Use saturated fills to mark priority, selected state, strong editorial interruption, or CTA emphasis."
    anti_patterns:
      - "Pastel panels or low-saturation background washes."
      - "Multiple bright blocks competing with no hierarchy."
      - "Gradient cards that soften the hazard identity."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: color-block-feature
    kind: "layout"
    pattern: "Feature modules may span multiple grid columns as full-bleed color blocks, but they still keep compact metadata and tight editorial hierarchy."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review"]
    guidance:
      - "Let one feature tile span two or three columns on desktop when it is the lead."
      - "Keep metadata, kicker, headline, image, and deck arranged as one intentional editorial unit."
      - "Clip imagery to the color block rather than floating it as a separate shadowed card."
      - "On mobile, collapse the feature to full width without muting its saturation."
    anti_patterns:
      - "Hero gradients with ornamental illustration."
      - "Feature cards that rely on image zoom or shadow lift for drama."
      - "Equal-width grids where the lead item is not visually distinct."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: display-shout-with-whisper-kicker
    kind: "content"
    pattern: "A large condensed display headline is paired with a thin or mono tracked kicker, creating shout-versus-whisper hierarchy."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review", "brief"]
    guidance:
      - "Use display scale only for the main masthead, lead headline, or major section statement."
      - "Keep display line-height very tight, but loosen it for fallback fonts if letters collide."
      - "Use a 19-20px light tracked kicker or 11-12px uppercase mono label above or beside the display shout."
      - "Let the deck explain the implication; do not make the display headline carry every detail."
    anti_patterns:
      - "Display type used for buttons, timestamps, small cards, or dense UI."
      - "All sections using the same huge headline scale."
      - "Loose leading that makes display type feel like a generic marketing hero."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: mono-uppercase-metadata
    kind: "content"
    pattern: "Metadata uses compact uppercase mono styling with visible tracking for timestamps, tags, kickers, labels, ranks, and CTAs."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Use uppercase labels with roughly 0.11-0.18em tracking."
      - "Keep labels short: one to three words, short timestamps, or compact states."
      - "Use mono metadata to orient content, not to decorate every line."
      - "Use 10-12px minimum for micro metadata and do not shrink it further on mobile."
    anti_patterns:
      - "Lowercase mono labels."
      - "Long all-caps sentences that become shouting body copy."
      - "Badges or tags that do not clarify time, state, section, or action."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: flat-hairline-depth
    kind: "visual"
    pattern: "Depth is flat and graphic: 1px rules, inset underlines, rings, and saturated fills replace drop shadows."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Use 1px borders on cards, images, inputs, and active states."
      - "Use inset underlines for active nav or tabs."
      - "Keep shadows off primary cards; if separation is required, use a 1px ring only."
      - "On hover, transition text or border color rather than lifting the card."
    anti_patterns:
      - "Material-style elevation shadows."
      - "Glow rings, frosted blur, or glass panels."
      - "Image zoom and card scale hover effects."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: dense-editorial-grid
    kind: "layout"
    pattern: "Digest pages sit on a dense editorial grid that alternates loud blocks with dark resets."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review", "brief"]
    guidance:
      - "Use a max-width around 1280px with 24px mobile and 48px desktop outer padding."
      - "Resolve desktop layouts into three or four columns, with feature modules spanning columns when priority demands it."
      - "Use 16-24px gutters between major columns and tighter 8-12px spacing inside stream structures."
      - "Use 32-64px dark vertical breaks between major sections as palette cleansers."
    anti_patterns:
      - "Airy luxury spacing that makes the page feel quiet."
      - "Uniform card grids with no pacing, interruption, or lead hierarchy."
      - "Overcrowded layouts that leave no dark reset between loud elements."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: hazard-pill-cta
    kind: "visual"
    pattern: "Primary actions are compact hazard pills: mint fill or transparent hazard outline, uppercase label, and no shadow."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Use a 24px radius mint-filled pill for the primary action with black text."
      - "Use 30-40px radius outline pills for secondary or promotional actions."
      - "Set CTA labels in uppercase mono or bold sans with visible tracking."
      - "Use focus rings that are explicit and contrast-safe; do not rely on glow."
    anti_patterns:
      - "Rectangular SaaS buttons with subtle shadows."
      - "Multiple primary mint buttons competing in one region."
      - "Lowercase friendly button copy when the rest of the surface uses signal metadata."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: static-image-frame
    kind: "behavior"
    pattern: "Images are contained and static: framed by a hairline, clipped to the tile, and never used for hover motion."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review"]
    guidance:
      - "Use 16:9 for hero/feature images, 4:3 for mid-feed, and 1:1 for thumbnails or avatars."
      - "Apply a 1px image frame in gray, white, or a contrast-safe rule color."
      - "Lazy-load below-fold images in generated examples when implementation allows it."
      - "Keep hover interaction on headline or border color, not image zoom, scale, or opacity."
    anti_patterns:
      - "Animated image zoom on card hover."
      - "Unframed images floating on the black canvas."
      - "Soft shadowed image cards inside stream tiles."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: signal-brief-anatomy
    kind: "structure"
    pattern: "A compact brief opens with signal metadata, a decisive headline or verdict, a short deck, then ruled evidence and one action."
    applies_to:
      paths: ["."]
      surface_types: ["brief", "review"]
    guidance:
      - "Start with a compact uppercase context line or timestamp."
      - "Make the headline, verdict, or current state the first major visual region."
      - "Use hairline-separated evidence rows or stream tiles for the supporting detail."
      - "Close with one mint or outlined hazard CTA only when action is requested."
    anti_patterns:
      - "Generic dashboard overview cards before the point of view."
      - "Multiple action buttons without a primary recommendation."
      - "Long body copy before the current state is visible."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: responsive-stream-collapse
    kind: "layout"
    pattern: "Responsive collapse preserves stream rhythm and accent saturation while reducing columns."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Collapse four or three columns to two columns on tablet and one column on mobile."
      - "Keep stream tiles full-width on small screens; the rail may become an inline timestamp row if space is tight."
      - "Tighten section padding before muting color or removing metadata."
      - "Scale display headlines with clamp() and leave safe area for host chrome."
    anti_patterns:
      - "Removing metadata on mobile until the feed loses order."
      - "Desaturating accent tiles on small screens."
      - "Keeping desktop multi-column spans that cause cramped mobile cards."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: host-frame-safe-area
    kind: "layout"
    pattern: "Full-screen generated surfaces leave safe space for host chrome while preserving the dramatic top composition."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Leave at least 72px of top breathing room in full-screen workbench compositions."
      - "Avoid pinning critical metadata or giant display words under host navigation."
      - "Scale or wrap display type before it crowds the viewport edge."
    anti_patterns:
      - "Masthead-scale text clipped by the host frame."
      - "Timeline rails starting under fixed navigation with no top padding."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: source-neutral-masthead-placeholder
    kind: "rule"
    pattern: "When a masthead or publication identity role is needed, use a neutral generated title or issue label instead of source marks."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review", "brief"]
    guidance:
      - "Use a fictional or task-derived title such as Signal Brief, Launch File, Field Notes, or the user's supplied product name."
      - "Keep masthead treatment as a composition role: display scale, placement, and contrast, not copied letterforms or source marks."
      - "Do not reproduce public publisher names, logos, article titles, author names, or section labels in portable exemplars."
      - "If the user asks to analyze a source site, keep that source attribution in prose outside the generated product surface."
    anti_patterns:
      - "A generated surface with a source publisher masthead or near-identical wordmark."
      - "Using real article titles or author names in exemplar screenshots."
      - "Treating ad creative as a reusable content module."
    evidence:
      - path: fingerprint/sources/curation/theverge-homepage-2026-06-22.md
      - path: examples/core/signal-lead-stack-desktop.png

  - id: segmented-stream-tabs
    kind: "visual"
    pattern: "Stream mode controls use one saturated active pill inside a muted segmented rail."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest"]
    guidance:
      - "Use a rounded segmented container with one violet or mint active segment and muted inactive segments."
      - "Set labels in uppercase mono with visible tracking."
      - "Use mode labels to orient the feed such as Top Stories, Latest, Following, Live, Saved, or Watchlist."
      - "On mobile, keep the segmented control full-width and large enough to tap rather than hiding mode behind a menu."
    anti_patterns:
      - "Tiny tab text that disappears on mobile."
      - "Multiple saturated active states in one segmented control."
      - "Segment labels that are decorative rather than mode-defining."
    evidence:
      - path: examples/core/latest-signal-rail-desktop.png
      - path: examples/core/mobile-top-story-stack.png
      - path: fingerprint/sources/curation/theverge-homepage-2026-06-22.md

  - id: lead-image-headline-slab
    kind: "layout"
    pattern: "A feature lead can pair an image-first block with an attached or overlapping headline slab, then subordinate supporting stories below."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review"]
    guidance:
      - "Let the image or display headline own the first read; do not split attention across equal cards."
      - "Use a high-contrast slab or dark panel for the headline and deck when it improves legibility against imagery."
      - "Place compact uppercase metadata below the deck, not as a competing headline row."
      - "Follow the lead with compact supporting rows or cells so the hierarchy remains obvious."
    anti_patterns:
      - "A generic hero image with a marketing CTA unrelated to the editorial claim."
      - "Equal-sized story cards where the lead is not distinguishable."
      - "Image overlays that reduce headline legibility or depend on gradients."
    evidence:
      - path: examples/core/signal-lead-stack-desktop.png
      - path: examples/core/mobile-top-story-stack.png
      - path: fingerprint/sources/curation/theverge-homepage-2026-06-22.md

  - id: compact-supporting-story-grid
    kind: "layout"
    pattern: "Supporting stories stay compact: thumbnail, headline, metadata, and hairline separation rather than full feature cards."
    applies_to:
      paths: ["."]
      surface_types: ["digest", "review"]
    guidance:
      - "Use two-column supporting grids on desktop when space allows."
      - "Keep thumbnails small and secondary to the headline."
      - "Use hairline separators to align rows and columns without card shadows."
      - "Demote supporting metadata through small uppercase labels and muted counts."
    anti_patterns:
      - "Large equal-weight cards for every supporting item."
      - "Thumbnail-heavy shopping grids."
      - "Supporting rows with no metadata or scan order."
    evidence:
      - path: examples/core/signal-lead-stack-desktop.png
      - path: examples/core/section-digest-module.png
      - path: fingerprint/sources/curation/theverge-homepage-2026-06-22.md

  - id: mobile-tabs-preserve-mode
    kind: "layout"
    pattern: "Mobile collapse preserves feed mode, lead hierarchy, metadata, and story order instead of squeezing the desktop grid."
    applies_to:
      paths: ["."]
      surface_types: ["feed", "digest", "review", "brief"]
    guidance:
      - "Collapse multi-column story grids into full-width stacked regions."
      - "Keep the active mode control visible near the top of the feed."
      - "Keep metadata at readable size; collapse rail labels to inline rows if needed."
      - "Preserve saturated active controls and lead image/headline scale rather than muting the visual language on mobile."
    anti_patterns:
      - "Desktop grids squeezed into narrow columns."
      - "Removing timestamps, counts, or mode labels on mobile."
      - "Shrinking display type until it loses the editorial lead role."
    evidence:
      - path: examples/core/mobile-top-story-stack.png
      - path: fingerprint/sources/curation/theverge-homepage-2026-06-22.md

