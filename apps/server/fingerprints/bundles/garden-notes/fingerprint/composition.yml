patterns:
  - id: planner-anatomy-uses-note-stack
    kind: "structure"
    pattern: "Planning surfaces use a bounded note stack: context header, next small step, supporting notes, and optional now/next/later pacing."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "checklist"]
    guidance:
      - "Open with a short context line that reflects the user's actual task."
      - "Make one next small step visibly primary."
      - "Use note panels for prep, constraints, reminders, and what can wait."
      - "Use now, next, and later only when sequence genuinely helps."
    anti_patterns:
      - "A pile of equally weighted rounded cards."
      - "Generic productivity dashboard sections."
      - "Introductory advice before the first action."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: staged-plan
    kind: "structure"
    pattern: "Planning surfaces show a staged path through soft note panels rather than a pile of generic cards."
    applies_to:
      paths: ["."]
      surface_types: ["planner"]
    guidance:
      - "Separate now, next, and later when the task has sequence."
      - "Use checklists, prep notes, compact detail panels, and gentle notebook pacing."
      - "Keep the page airy but not empty; anchor content in a bounded rounded shell."
      - "Use large rounded cream panels, green accents, soft shadows, garden-bed groupings, and tactile note-card layers."
      - "Make badges visibly gentle: time, effort, confidence, season, energy, or readiness chips."
    anti_patterns:
      - "Dense dashboards for simple personal tasks."
      - "Stark editorial broadsheets, hairline matrices, black ink blocks, square newspaper panels, or table-first scorecards."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: comparison-for-life-admin
    kind: "structure"
    pattern: "Personal comparisons prioritize fit, friction, and timing with a clearly kind good-enough choice."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "planner"]
    guidance:
      - "Compare options by practical criteria such as ease, timing, materials, confidence, and emotional load."
      - "Highlight the easiest good-enough choice with a soft green panel, friendly badge, or rounded recommendation note."
      - "Use gentle badges for time, effort, and confidence."
      - "Prefer stacked note panels, checklists, prep baskets, and rounded callouts over strict grids."
    anti_patterns:
      - "Overly technical scorecards for low-stakes personal choices."
      - "Monochrome editorial spreads, dominant verdict headlines, dense ruled tables, or severe typography."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: comparison-uses-fit-friction-timing
    kind: "layout"
    pattern: "Life-admin comparisons use fit, friction, timing, materials, confidence, and emotional load instead of false precision."
    applies_to:
      paths: ["."]
      surface_types: ["comparison"]
    guidance:
      - "Use soft columns or stacked notes when options need comparison."
      - "Keep criteria human and practical: ease, timing, materials, cost, energy, readiness, confidence."
      - "Give the recommended option a warmer note or badge, not a severe winner label."
      - "Name the accepted tradeoff in one sentence."
    anti_patterns:
      - "Numeric scorecards for low-stakes personal choices."
      - "Hard red/green winners and losers."
      - "Editorial matrices with heavy rules."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: prep-basket-before-checklist
    kind: "structure"
    pattern: "When readiness matters, show a prep basket before the action checklist."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "checklist"]
    guidance:
      - "Group materials, timing, constraints, and conditions before listing tasks."
      - "Use compact note panels for what to gather or check."
      - "Keep the action list short enough to start today."
    anti_patterns:
      - "Long checklists that mix materials, decisions, and tasks indiscriminately."
      - "Decorative seasonal cards without readiness information."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: badges-carry-state
    kind: "visual"
    pattern: "Badges carry planning state: time, effort, readiness, season, confidence, energy, or waiting."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Use badges to reduce reading, not to decorate every note."
      - "Keep labels short and practical."
      - "Use soft green, clay, muted blue, or warning tones only when the state calls for it."
    anti_patterns:
      - "Badges used as confetti."
      - "Mood tags that do not affect the plan."
      - "Too many chips competing with the next action."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: gentle-depth-without-card-pile
    kind: "layout"
    pattern: "Depth comes from one bounded shell and a few layered notes, not nested cards inside cards."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Use one outer rounded shell to hold the plan."
      - "Layer only the notes that need separation."
      - "Keep shadows soft and purposeful."
      - "Let whitespace create breathing room around the first action."
    anti_patterns:
      - "Cards inside cards inside more cards."
      - "A dashboard grid where every note has equal status."
      - "Empty pastel space that makes the plan feel unfinished."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: now-next-later-only-when-needed
    kind: "content"
    pattern: "Now/next/later is a pressure-release device, not a required template."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "checklist"]
    guidance:
      - "Use now/next/later when the task has sequence or overload."
      - "Skip staging for tiny one-step tasks."
      - "Make Later explicitly reassuring when it is used."
    anti_patterns:
      - "Forcing every prompt into three stages."
      - "Hiding the actual first action under process labels."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: copy-is-specific-and-unpressured
    kind: "content"
    pattern: "Copy uses concrete, low-pressure verbs and avoids productivity theater."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Use words like gather, pick, check, text, set aside, start, and wait."
      - "Avoid crush, optimize, maximize, perfect, hack, dominate, or hustle."
      - "Name constraints plainly without shaming the user."
      - "Prefer one helpful sentence over a motivational paragraph."
    anti_patterns:
      - "Self-help slogans."
      - "Urgency copy for tasks that are not urgent."
      - "Generic encouragement that does not change the next move."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: host-frame-safe-area
    kind: "layout"
    pattern: "Full-screen generated surfaces leave safe space for host chrome."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Leave at least 72px of top breathing room in full-screen workbench compositions."
      - "Avoid placing important headings at the extreme top-left edge."
    anti_patterns:
      - "Page titles pinned under host navigation."
      - "Oversized soft shells that collide with host chrome."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
