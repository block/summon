building_blocks:
  tokens:
    - "--color-bg: soft outdoor notebook field."
    - "--color-surface: warm cream note paper."
    - "--color-surface-muted: quiet secondary note or prep area."
    - "--color-border: gentle plant-toned separation."
    - "--color-border-strong: stronger readiness or selected-note boundary."
    - "--color-text: primary planning copy."
    - "--color-text-muted: patient secondary context."
    - "--color-text-alt: note labels and supporting detail."
    - "--color-accent: soft green emphasis for the chosen next step."
    - "--color-danger, --color-success, --color-info, --color-warning: real state only, never confetti."
    - "--space-4 through --space-8: airy notebook rhythm."
    - "--radius-sm through --radius-xl: soft note-card geometry."
    - "--radius-pill: badges and compact state chips."
    - "--font-sans: friendly planning voice."
    - "--font-serif: optional quiet pull note, not a primary editorial voice."
    - "--text-xl through --text-display: warm headings; scale down before they become heroic."
    - "--shadow-mini through --shadow-modal: soft depth for note layering, used sparingly."
  components:
    - "note-panel"
    - "staged-checklist"
    - "gentle-badge"
    - "context-header"
    - "next-small-step-callout"
    - "prep-basket"
    - "now-next-later-stack"
    - "good-enough-choice-note"
    - "fit-friction-timing-comparison"
    - "can-wait-note"
    - "readiness-chip"
    - "tiny-routine-checklist"
    - "gentle-reminder-row"
    - "half-finished-plan-resume"
    - "copy atom: Tiny start, Now, Next, Later, Can wait, Gather, Check first, Good enough, Low effort, Ready, Needs one thing, Energy, Season, Timing."
    - "state variant: selected choice, recommended next step, waiting item, blocked task, ready prep, empty plan, error state, incomplete routine."
    - "micro-pattern: prep basket before checklist, with materials and readiness separated from action."
    - "micro-pattern: can-wait note that lowers pressure without hiding useful context."
    - "micro-pattern: good-enough choice note with one accepted tradeoff."
    - "micro-pattern: readiness chip row for time, effort, confidence, season, energy, or waiting."
  libraries: []
  files:
    - "fingerprint/sources/curation/source-study-2026-06-22.md"
  notes:
    - "Soft green is a planning emphasis color, not a default decoration for every element."
    - "Garden motifs should be implied through pacing, warmth, and note geometry, not literal illustration."
    - "The strong contrast against Editorial Mono is part of the catalog value; do not turn personal planning into austere critique."
    - "The display scale exists for warm headings, but generated surfaces should avoid marketing-hero posture."
    - "No canonical image exemplars are approved yet; add inventory.exemplars only from human-curated surfaces or accepted generation runs."

sources:
  - id: "source-study"
    kind: "file"
    ref: "sources/curation/source-study-2026-06-22.md"
    note: "Curation note for the upgraded Summon marketplace fingerprint."
