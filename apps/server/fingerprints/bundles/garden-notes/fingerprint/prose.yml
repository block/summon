summary:
  product: "Garden Notes"
  audience:
    - "people planning personal tasks"
    - "people comparing low-stakes life-admin options"
    - "agents composing humane planning surfaces"
  goals:
    - "Make next steps feel manageable without flattening context."
    - "Preserve the user's real constraints, materials, uncertainty, and energy."
    - "Use soft planning structure to reduce pressure while still producing a concrete action."
    - "Make personal comparisons kind, practical, and good-enough rather than severe."
  anti_goals:
    - "Generic productivity dashboards, kanban boards, project-management metaphors, or optimization language."
    - "Literal botanical decoration, garden illustrations, or plant motifs that do not clarify the task."
    - "Motivational slogans, self-help filler, or cheerleading in place of concrete planning."
    - "Hard winner/loser verdicts for low-stakes personal choices."
    - "Arbitrary rounded card piles where every note has the same weight."
    - "Severe editorial broadsheets, monochrome scorecards, or dense ruled matrices."
  tradeoffs:
    - "Prefer gentle but decisive guidance over exhaustive task management."
    - "Prefer airy but bounded composition over empty whitespace."
    - "Use warmth only when it helps task clarity, pacing, or emotional ease."
    - "Name what can wait as clearly as what should happen now."
  tone:
    - "warm"
    - "practical"
    - "unhurried"
    - "encouraging"
    - "specific"
    - "low-pressure"

situations:
  - id: planning-from-messy-request
    title: "Planning from a messy request"
    user_intent: "Turn an unstructured life task into a clear plan."
    product_obligation: "Preserve context, identify the next small step, and separate now, next, and later only when sequence matters."
    surface_type: "planner"
    principles:
      - prose.principle:humane-pacing
      - prose.principle:specific-context-reduces-pressure
    experience_contracts:
      - prose.experience_contract:next-small-step
      - prose.experience_contract:context-stays-specific
    patterns:
      - composition.pattern:planner-anatomy-uses-note-stack
      - composition.pattern:copy-is-specific-and-unpressured
    refuses:
      - "Dense dashboards for simple personal planning."
      - "Generic productivity templates that erase the user's actual context."

  - id: life-admin-comparison
    title: "Life-admin comparison"
    user_intent: "Compare low-stakes options such as errands, purchases, appointments, or household choices."
    product_obligation: "Name a kind good-enough recommendation and the tradeoff it accepts."
    surface_type: "comparison"
    principles:
      - prose.principle:good-enough-is-a-design-value
      - prose.principle:humane-pacing
    experience_contracts:
      - prose.experience_contract:good-enough-choice
      - prose.experience_contract:soft-does-not-mean-vague
    patterns:
      - composition.pattern:comparison-uses-fit-friction-timing
      - composition.pattern:gentle-depth-without-card-pile
    refuses:
      - "Strict scorecards that make personal choices feel high-stakes."
      - "Equal-weight option cards with no recommendation."

  - id: seasonal-or-material-prep
    title: "Seasonal or material prep"
    user_intent: "Prepare for a task that depends on materials, timing, weather, energy, or readiness."
    product_obligation: "Show what to gather, what to check, and what can wait."
    surface_type: "planner"
    principles:
      - prose.principle:specific-context-reduces-pressure
      - prose.principle:warmth-serves-action
    experience_contracts:
      - prose.experience_contract:what-can-wait-is-visible
      - prose.experience_contract:context-stays-specific
    patterns:
      - composition.pattern:prep-basket-before-checklist
      - composition.pattern:badges-carry-state
    refuses:
      - "Decorative seasonal theming without useful preparation."
      - "Long checklists that do not separate readiness from action."

  - id: returning-to-half-finished-plan
    title: "Returning to a half-finished plan"
    user_intent: "Pick a plan back up without shame or restart friction."
    product_obligation: "Re-state what is already done, make the next gentle re-entry step visible, and demote everything else."
    surface_type: "planner"
    principles:
      - prose.principle:humane-pacing
      - prose.principle:warmth-serves-action
    experience_contracts:
      - prose.experience_contract:next-small-step
      - prose.experience_contract:what-can-wait-is-visible
    patterns:
      - composition.pattern:now-next-later-only-when-needed
      - composition.pattern:copy-is-specific-and-unpressured
    refuses:
      - "Progress-shaming copy, streaks, urgency timers, or reset language."

  - id: tiny-routine-checklist
    title: "Tiny routine checklist"
    user_intent: "Create or follow a small repeatable routine."
    product_obligation: "Keep the checklist short, tactile, and easy to begin."
    surface_type: "checklist"
    principles:
      - prose.principle:good-enough-is-a-design-value
      - prose.principle:specific-context-reduces-pressure
    experience_contracts:
      - prose.experience_contract:soft-does-not-mean-vague
      - prose.experience_contract:next-small-step
    patterns:
      - composition.pattern:badges-carry-state
      - composition.pattern:gentle-depth-without-card-pile
    refuses:
      - "Overbuilt habit dashboards, analytics, or gamified productivity."

principles:
  - id: humane-pacing
    principle: "Break tasks into steps that feel doable now, next, and later, with soft context preserved around each step."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Use concrete details from the request and avoid generic productivity language."
      - "Keep the surface airy but bounded so it does not feel empty."
      - "Prefer warm language, soft green emphasis, round note panels, friendly badges, and checklist affordances."
      - "Use copy that reduces pressure: name the easiest next step, what can wait, and what would make the task feel lighter."
    counterexamples:
      - "Motivational slogans."
      - "Excessive urgency."
      - "Black-and-white editorial judgment, dense ruled tables, or severe comparison scorecards."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: specific-context-reduces-pressure
    principle: "Personal planning feels lighter when the surface reflects the user's actual context instead of generic advice."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Carry forward people, places, materials, dates, constraints, uncertainty, and energy from the prompt."
      - "Use concrete nouns and verbs before abstract categories."
      - "Prefer a few grounded steps over a broad productivity framework."
    counterexamples:
      - "Template labels such as Task 1, Task 2, and Optimize."
      - "Advice that could fit any user without changes."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: good-enough-is-a-design-value
    principle: "Garden Notes helps users pick a good-enough next move instead of maximizing every variable."
    applies_to:
      paths: ["."]
      surface_types: ["comparison", "planner", "checklist"]
    guidance:
      - "Name the easiest acceptable option when the stakes are low."
      - "Explain the tradeoff gently and briefly."
      - "Avoid scoring systems that imply false precision."
    counterexamples:
      - "Winner-take-all rankings for household choices."
      - "Long optimization matrices for simple errands."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: warmth-serves-action
    principle: "Warmth is useful when it makes the next action easier; it should not become decoration."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    guidance:
      - "Use rounded notes, green emphasis, and gentle shadows to pace the plan."
      - "Let badges communicate readiness, time, effort, confidence, season, or energy."
      - "Avoid literal garden motifs unless the task itself is about gardening or seasonal prep."
    counterexamples:
      - "Plant graphics or cozy doodles that do not clarify the plan."
      - "Warm filler copy that avoids a concrete recommendation."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

experience_contracts:
  - id: next-small-step
    contract: "Every planning surface should make the next small step obvious and emotionally easy to begin."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    obligations:
      - "Show now, next, and later when sequence matters."
      - "Use gentle badges for time, effort, confidence, readiness, or seasonality."
      - "Highlight one kind good-enough choice or first action in a soft rounded callout."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: context-stays-specific
    contract: "The surface keeps the user's concrete context visible."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    obligations:
      - "Reuse meaningful details from the prompt instead of replacing them with generic labels."
      - "Name relevant materials, timing, constraints, or uncertainty."
      - "Keep context near the plan, not buried in an intro paragraph."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: good-enough-choice
    contract: "Comparisons name one kind recommendation and the tradeoff it accepts."
    applies_to:
      paths: ["."]
      surface_types: ["comparison"]
    obligations:
      - "Pick the easiest acceptable option when evidence supports it."
      - "Explain why it is enough for this moment."
      - "Avoid hard verdict language when the stakes are personal and low."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: soft-does-not-mean-vague
    contract: "Gentle surfaces still end in concrete action."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "comparison", "checklist"]
    obligations:
      - "Use verbs the user can do today."
      - "Avoid motivational filler."
      - "Make the first action visible without requiring the whole plan to be read."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md

  - id: what-can-wait-is-visible
    contract: "The plan lowers pressure by naming what can wait."
    applies_to:
      paths: ["."]
      surface_types: ["planner", "checklist"]
    obligations:
      - "Separate urgent, useful, and deferrable work when the task has multiple parts."
      - "Use a Later, Can wait, or Parked note only when it reduces pressure."
      - "Do not hide all non-immediate work if it helps the user trust the plan."
    evidence:
      - path: fingerprint/sources/curation/source-study-2026-06-22.md
