<!-- summon: kind=atom -->
<!-- Badge — pill-rounded, tight padding, uppercase voice; state variants via semantic tokens. -->
<div style="display: inline-flex; gap: var(--space-2); align-items: center; flex-wrap: wrap;">
  <span style="
    display: inline-flex; align-items: center;
    padding: 2px var(--space-3);
    background: var(--color-accent); color: var(--color-accent-fg);
    border-radius: var(--radius-pill);
    font: 600 var(--text-xs) var(--font-sans);
    letter-spacing: 0.02em;
    white-space: nowrap;
  ">Active</span>
  <span style="
    display: inline-flex; align-items: center;
    padding: 2px var(--space-3);
    background: var(--color-surface-muted); color: var(--color-text);
    border-radius: var(--radius-pill);
    font: 500 var(--text-xs) var(--font-sans);
    white-space: nowrap;
  ">Draft</span>
  <span style="
    display: inline-flex; align-items: center;
    padding: 2px var(--space-3);
    background: transparent; color: var(--color-danger);
    border: 1px solid var(--color-danger);
    border-radius: var(--radius-pill);
    font: 600 var(--text-xs) var(--font-sans);
    letter-spacing: 0.02em;
    white-space: nowrap;
  ">Overdue</span>
</div>
