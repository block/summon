<!-- summon: kind=shape; shape=tracker -->
<!-- Dashboard/tracker shape. The dominant element is a BIG number, not a headline.
     Progress bar + grouped stat cells fill the rest. No "header" in the card sense. -->
<div style="padding: var(--space-5);">
  <div style="
    font: 600 var(--text-xs) var(--font-sans);
    letter-spacing: var(--tracking-label);
    text-transform: uppercase;
    color: var(--color-text-muted);
    margin-bottom: var(--space-3);
  ">Reading · 2026</div>

  <div style="
    display: flex; align-items: baseline; gap: var(--space-4);
    margin-bottom: var(--space-5);
  ">
    <div style="
      font: 900 var(--text-3xl) var(--font-sans);
      letter-spacing: var(--tracking-display);
      line-height: var(--leading-display);
      color: var(--color-text);
    ">9<span style="font-weight: 400; color: var(--color-text-muted); font-size: var(--text-xl); letter-spacing: -0.01em;">&thinsp;/&thinsp;24</span></div>
    <div style="
      font: 400 var(--text-sm) var(--font-sans);
      line-height: var(--leading-body);
      color: var(--color-text-alt);
    ">books finished —
      <strong style="color: var(--color-success); font-weight: 600;">ahead of pace</strong>
      by 2
    </div>
  </div>

  <div style="
    height: 6px;
    background: var(--color-surface-muted);
    border-radius: var(--radius-pill);
    overflow: hidden;
    margin-bottom: var(--space-5);
  ">
    <div style="
      width: 37.5%; height: 100%;
      background: var(--color-accent);
      border-radius: var(--radius-pill);
    "></div>
  </div>

  <div style="
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: var(--space-3);
  ">
    <div style="
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    ">
      <div style="
        font: 700 var(--text-lg) var(--font-sans);
        letter-spacing: var(--tracking-tight);
        color: var(--color-text);
      ">4</div>
      <div style="
        margin-top: var(--space-1);
        font: 600 var(--text-xs) var(--font-sans);
        letter-spacing: var(--tracking-label);
        text-transform: uppercase;
        color: var(--color-text-muted);
      ">Fiction</div>
    </div>
    <div style="
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    ">
      <div style="
        font: 700 var(--text-lg) var(--font-sans);
        letter-spacing: var(--tracking-tight);
        color: var(--color-text);
      ">3</div>
      <div style="
        margin-top: var(--space-1);
        font: 600 var(--text-xs) var(--font-sans);
        letter-spacing: var(--tracking-label);
        text-transform: uppercase;
        color: var(--color-text-muted);
      ">Essays</div>
    </div>
    <div style="
      padding: var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
    ">
      <div style="
        font: 700 var(--text-lg) var(--font-sans);
        letter-spacing: var(--tracking-tight);
        color: var(--color-text);
      ">2</div>
      <div style="
        margin-top: var(--space-1);
        font: 600 var(--text-xs) var(--font-sans);
        letter-spacing: var(--tracking-label);
        text-transform: uppercase;
        color: var(--color-text-muted);
      ">Memoir</div>
    </div>
  </div>
</div>
