<!-- summon: kind=atom -->
<!-- Button — pill radius, compact height, monochrome primary, ghost variant. -->
<div style="display: inline-flex; gap: var(--space-3); align-items: center;">
  <button style="
    height: 36px; padding: 0 var(--space-5);
    display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
    background: var(--color-accent); color: var(--color-accent-fg);
    border: 0; border-radius: var(--radius-pill);
    font: 600 var(--text-sm) var(--font-sans); letter-spacing: -0.005em;
    cursor: pointer; white-space: nowrap;
  ">Confirm</button>
  <button style="
    height: 36px; padding: 0 var(--space-5);
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent; color: var(--color-text);
    border: 1px solid var(--color-border); border-radius: var(--radius-pill);
    font: 500 var(--text-sm) var(--font-sans);
    cursor: pointer; white-space: nowrap;
  ">Cancel</button>
  <button style="
    height: 32px; padding: 0 var(--space-4);
    background: transparent; color: var(--color-text-alt);
    border: 0; border-radius: var(--radius-pill);
    font: 500 var(--text-sm) var(--font-sans);
    cursor: pointer;
  ">Skip</button>
</div>
