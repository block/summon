<!-- summon: kind=atom -->
<!-- Input — pill-rounded, 36px height, label above in uppercase eyebrow voice.
     Focus is a subtle 1px strong-border ring at half opacity. -->
<label style="display: flex; flex-direction: column; gap: var(--space-2); width: 320px;">
  <span style="
    font: 600 var(--text-xs) var(--font-sans);
    letter-spacing: var(--tracking-label);
    text-transform: uppercase;
    color: var(--color-text-muted);
  ">Email</span>
  <input type="email" placeholder="sarah.chen@example.com" style="
    height: 36px;
    padding: 0 var(--space-4);
    background: var(--color-surface);
    color: var(--color-text);
    border: 1px solid var(--color-border-input);
    border-radius: var(--radius-pill);
    font: 400 var(--text-sm) var(--font-sans);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  ">
</label>
