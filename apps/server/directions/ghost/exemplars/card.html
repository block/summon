<!-- summon: kind=shape; shape=card -->
<!-- Card — moderate radius (20px), 24px internal rhythm, thin border, subtle hover-shadow cue.
     Header uses eyebrow-over-headline editorial pattern; action aligns top-right. -->
<article style="
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  display: flex; flex-direction: column; gap: var(--space-5);
">
  <header style="display: grid; grid-template-columns: 1fr auto; gap: var(--space-4); align-items: start;">
    <div>
      <div style="
        font: 600 var(--text-xs) var(--font-sans);
        letter-spacing: var(--tracking-label);
        text-transform: uppercase;
        color: var(--color-text-muted);
        margin-bottom: var(--space-2);
      ">Weekly summary</div>
      <h2 style="
        margin: 0;
        font: 700 var(--text-xl) var(--font-sans);
        letter-spacing: var(--tracking-tight);
        line-height: var(--leading-section);
        color: var(--color-text);
      ">Revenue steady at $284k</h2>
      <p style="
        margin: var(--space-2) 0 0;
        font: 400 var(--text-sm) var(--font-sans);
        color: var(--color-text-alt);
        line-height: var(--leading-body);
      ">Up 3.2% week-over-week, driven by mid-market renewals.</p>
    </div>
    <button style="
      height: 32px; padding: 0 var(--space-4);
      background: transparent; color: var(--color-text);
      border: 1px solid var(--color-border); border-radius: var(--radius-pill);
      font: 500 var(--text-sm) var(--font-sans);
      cursor: pointer;
    ">Expand</button>
  </header>
  <div style="
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
    padding-top: var(--space-4);
    border-top: 1px solid var(--color-border);
  ">
    <div>
      <div style="font: 700 var(--text-lg) var(--font-sans); letter-spacing: var(--tracking-tight);">$284,120</div>
      <div style="font: 500 var(--text-xs) var(--font-sans); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--color-text-muted); margin-top: var(--space-1);">Revenue</div>
    </div>
    <div>
      <div style="font: 700 var(--text-lg) var(--font-sans); letter-spacing: var(--tracking-tight);">1,482</div>
      <div style="font: 500 var(--text-xs) var(--font-sans); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--color-text-muted); margin-top: var(--space-1);">Orders</div>
    </div>
    <div>
      <div style="font: 700 var(--text-lg) var(--font-sans); letter-spacing: var(--tracking-tight);">$192</div>
      <div style="font: 500 var(--text-xs) var(--font-sans); letter-spacing: var(--tracking-label); text-transform: uppercase; color: var(--color-text-muted); margin-top: var(--space-1);">AOV</div>
    </div>
  </div>
</article>
