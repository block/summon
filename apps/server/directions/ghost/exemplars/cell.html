<!-- summon: kind=atom -->
<!-- List cell — compact row with leading mark, tight group for title/meta,
     trailing value/time pair. Groups tight within, generous between rows. -->
<ul style="
  list-style: none; margin: 0; padding: 0;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
">
  <li style="
    display: grid; grid-template-columns: auto 1fr auto;
    gap: var(--space-4); align-items: center;
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--color-border);
  ">
    <div style="
      width: 36px; height: 36px; border-radius: var(--radius-pill);
      background: var(--color-surface-muted);
      display: flex; align-items: center; justify-content: center;
      font: 600 var(--text-sm) var(--font-sans);
      color: var(--color-text);
    ">SC</div>
    <div>
      <div style="font: 600 var(--text-md) var(--font-sans); color: var(--color-text);">Sarah Chen</div>
      <div style="font: 400 var(--text-sm) var(--font-sans); color: var(--color-text-muted); margin-top: 2px;">Quarterly review scheduled</div>
    </div>
    <div style="text-align: right;">
      <div style="font: 600 var(--text-sm) var(--font-sans); color: var(--color-text);">$4,280.50</div>
      <div style="font: 400 var(--text-xs) var(--font-sans); color: var(--color-text-muted); margin-top: 2px;">Mar 14</div>
    </div>
  </li>
  <li style="
    display: grid; grid-template-columns: auto 1fr auto;
    gap: var(--space-4); align-items: center;
    padding: var(--space-4) var(--space-5);
  ">
    <div style="
      width: 36px; height: 36px; border-radius: var(--radius-pill);
      background: var(--color-surface-muted);
      display: flex; align-items: center; justify-content: center;
      font: 600 var(--text-sm) var(--font-sans);
      color: var(--color-text);
    ">MJ</div>
    <div>
      <div style="font: 600 var(--text-md) var(--font-sans); color: var(--color-text);">Marcus Johnson</div>
      <div style="font: 400 var(--text-sm) var(--font-sans); color: var(--color-text-muted); margin-top: 2px;">Onboarding week 2 complete</div>
    </div>
    <div style="text-align: right;">
      <div style="font: 600 var(--text-sm) var(--font-sans); color: var(--color-text);">$1,105.00</div>
      <div style="font: 400 var(--text-xs) var(--font-sans); color: var(--color-text-muted); margin-top: 2px;">Mar 12</div>
    </div>
  </li>
</ul>
