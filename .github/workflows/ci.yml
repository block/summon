name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Show package manager config
        run: |
          pnpm --version
          pnpm config get registry
      - name: Install dependencies
        run: |
          set +e
          pnpm install --frozen-lockfile --reporter append-only 2>&1 | tee pnpm-install.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::pnpm install failure tail"
            tail -120 pnpm-install.log
            echo "::endgroup::"
            message=$(tail -40 pnpm-install.log | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e ':a;N;$!ba;s/\n/%0A/g')
            echo "::error title=pnpm install failed::$message"
            exit "$status"
          fi
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm check:public-packages
      - run: pnpm pack:dry-run

  safety:
    name: Browser Safety Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Show package manager config
        run: |
          pnpm --version
          pnpm config get registry
      - name: Install dependencies
        run: |
          set +e
          pnpm install --frozen-lockfile --reporter append-only 2>&1 | tee pnpm-install.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::group::pnpm install failure tail"
            tail -120 pnpm-install.log
            echo "::endgroup::"
            message=$(tail -40 pnpm-install.log | sed -e 's/%/%25/g' -e 's/\r/%0D/g' -e ':a;N;$!ba;s/\n/%0A/g')
            echo "::error title=pnpm install failed::$message"
            exit "$status"
          fi
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm test:safety
